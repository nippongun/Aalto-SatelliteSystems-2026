# mission_config.yaml — Single source of truth for all mission parameters
# Edit this file to update all generated outputs.

mission_name: "AtmoSat-1"              # working name — team to confirm
document_name: "SatelliteSystems-2026" # output DOCX filename stem
satellite_class: "3U CubeSat"
mass_kg: 4.0                           # 3U CubeSat typical max; to be refined in mass budget
orbit_type: "SSO"                      # Sun-Synchronous Orbit
orbit_altitude_km: 500                 # confirmed 2026-04-19 — lowered from 750 km for passive 25-year deorbit compliance
inclination_deg: 97.4                  # SSO at 500 km
mission_application: "Atmospheric monitoring of ozone and CO over European conflict and reference regions"
payload_type: "UV spectrometer + SWIR spectrometer"
payload_secondary: "Visible/NIR camera (albedo)"  # nice-to-have, not primary

# RF / communications
frequency_GHz: 8.0                     # X-band downlink (placeholder — to be confirmed)
tx_power_dBm: 30
eps_power_W: 10                        # 3U solar panel generation estimate; to be refined

# Ground segment
ground_station: "Aalto"

# Team
authors: "Maiju Alavuotunki · Alissa Lebedeva · Simon Bauer"

# Document links
google_doc_url: "https://docs.google.com/document/d/1DMcIpjzz6VhrpJAM9PQOc544N8h6UFNU"
